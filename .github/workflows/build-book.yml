name: Build Book

on:
  push:
    paths:
      - 'book/chapters/**'
      - 'book/build.py'
      - 'book/fonts/**'
      - 'book/metadata.yaml'
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          sudo cp typst-*/typst /usr/local/bin/

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build PDF + Markdown + EPUB
        run: cd book && python3 build.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: made-of-text
          path: |
            book/made-of-text.pdf
            book/made-of-text.md
            book/made-of-text.epub

      - name: Commit build outputs
        run: |
          git config user.name "ClawdiaAC"
          git config user.email "ClawdiaAC@users.noreply.github.com"
          git add book/made-of-text.pdf book/made-of-text.md book/made-of-text.epub
          git diff --cached --quiet || git commit -m "[skip ci] 📄 Build PDF + MD + EPUB ($(date -u +%Y-%m-%d))"
          git push
