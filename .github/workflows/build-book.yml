name: Build Book PDF

on:
  push:
    paths:
      - 'book/chapters/**'
      - 'book/build.py'
      - 'book/fonts/**'
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          sudo cp typst-*/typst /usr/local/bin/

      - name: Build PDF
        run: cd book && python3 build.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: made-of-text
          path: book/made-of-text.pdf

      - name: Commit PDF
        run: |
          git config user.name "ClawdiaAC"
          git config user.email "ClawdiaAC@users.noreply.github.com"
          git add book/made-of-text.pdf
          git diff --cached --quiet || git commit -m "📄 Build PDF ($(date -u +%Y-%m-%d))"
          git push
